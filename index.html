<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全績效管理系統 (OSPMS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow: hidden; }
        
        .sidebar { width: 280px; flex-shrink: 0; }

        .table-container { 
            overflow: auto; 
            height: calc(100vh - 160px); 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .sticky-col-num { position: sticky; left: 0; z-index: 25; background: #fff; min-width: 40px; text-align: center; }
        .sticky-col-name { position: sticky; left: 40px; z-index: 25; background: #fff; border-right: 2px solid #f1f5f9; min-width: 150px; }

        tr:hover .sticky-col-num, tr:hover .sticky-col-name { background-color: #f8fafc; }

        thead th { position: sticky; top: 0; z-index: 30; background: #f1f5f9; }
        thead th.sticky-col-num { z-index: 41; left: 0; }
        thead th.sticky-col-name { z-index: 40; left: 40px; }

        .input-cell { 
            width: 100%; 
            text-align: center; 
            border: 1px solid transparent; 
            border-radius: 4px; 
            padding: 4px 1px; 
            font-size: 11px; 
            transition: all 0.2s;
            background: transparent;
            color: #475569;
        }
        .input-cell:disabled { cursor: not-allowed; opacity: 1; color: #475569; }
        .input-cell:not(:disabled):hover { border-color: #cbd5e1; background: #fff; }
        .input-cell:not(:disabled):focus { border-color: #3b82f6; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .admin-edit-cell { background-color: #fefce8 !important; border: 1px dashed #eab308 !important; color: #475569 !important; }

        .year-input {
            background: #dbeafe;
            color: #1d4ed8;
            border: 2px solid transparent;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            width: 180px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        .attachment-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
        }
        .attachment-btn i { 
            width: 10px; 
            height: 10px; 
            stroke-width: 2.5px; 
        }
        .attachment-btn.has-file { color: #3b82f6; opacity: 1; }
        .attachment-btn.no-file { color: #d1d5db; opacity: 0.4; }
        .attachment-btn:hover { opacity: 1; transform: scale(1.2); }

        #upload-status-box.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.02);
        }

        /* 排序選單樣式 */
        .sort-menu {
            position: absolute;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 4px;
            z-index: 100;
            display: none;
            min-width: 120px;
        }
        .sort-menu button {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .sort-menu button:hover { background: #f1f5f9; color: #1e293b; }
        .sort-menu button:disabled { opacity: 0.4; cursor: not-allowed; }

        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            .no-print { display: none !important; }
            body { background-color: white !important; overflow: visible !important; height: auto !important; }
            .table-container { overflow: visible !important; height: auto !important; width: 100% !important; box-shadow: none !important; }
            table { table-layout: fixed; width: 100% !important; font-size: 9px !important; }
            .sticky-col-num, .sticky-col-name { position: static !important; background: white !important; }
            th, td { padding: 4px 2px !important; border: 1px solid #e2e8f0 !important; }
            .attachment-btn { display: none; }
        }
    </style>
</head>
<body class="text-slate-800 flex h-screen">

    <aside class="sidebar bg-slate-900 flex flex-col no-print">
        <div class="p-6 border-b border-slate-800">
            <div class="flex justify-between items-start">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-xl">
                        <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-white tracking-tight leading-none">OSPMS</h1>
                        <p class="text-[8px] text-blue-400 font-bold uppercase tracking-tighter mt-1">Occupational Safety Performance Management System</p>
                    </div>
                </div>
                <button id="admin-toggle-btn" onclick="handleAuthClick()" class="text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="lock" class="w-5 h-5" id="auth-icon"></i>
                </button>
            </div>
            <p class="text-[12px] text-slate-300 font-bold mt-4">職業安全績效管理系統</p>
        </div>
        
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">系統分類目錄</span>
            </div>
            <div class="space-y-1" id="nav-tabs"></div>
        </nav>

        <div class="p-4 bg-slate-800/30 space-y-2">
            <div id="admin-badge" class="hidden px-4 py-2 bg-yellow-500/10 border border-yellow-500/20 rounded-lg mb-2">
                <p class="text-[10px] text-yellow-500 font-bold text-center">管理員編輯模式</p>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="exportJSON()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="file-json" class="w-3 h-3"></i><span>導出數據庫</span>
                </button>
                <button onclick="document.getElementById('import-input').click()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="upload" class="w-3 h-3"></i><span>導入數據庫</span>
                </button>
                <input type="file" id="import-input" class="hidden" accept=".json" onchange="importJSON(this)">
            </div>

            <button class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 hover:bg-blue-500 transition" onclick="exportFullReport()">
                <i data-lucide="download" class="w-4 h-4"></i><span>匯出全年度績效報表 (Excel)</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white px-8 py-5 border-b border-slate-200 flex justify-between items-center shrink-0">
            <div>
                <h2 id="current-category-title" class="text-xl font-black text-slate-900 tracking-tight leading-none">載入中...</h2>
                <div class="flex items-center mt-2">
                    <input type="text" id="year-input-field" class="year-input" value="2026年度 (115年)" 
                           onclick="this.select()" 
                           onblur="handleYearFormat(this)"
                           onkeydown="if(event.key === 'Enter') handleYearFormat(this)">
                </div>
            </div>
            <div class="flex items-center space-x-3 no-print">
                <button id="save-logout-btn" onclick="saveAndLogout()" class="hidden flex items-center space-x-2 px-5 py-2.5 bg-green-600 text-white rounded-full text-sm font-bold transition shadow-sm hover:bg-green-700">
                    <i data-lucide="save" class="w-4 h-4"></i><span>儲存並登出系統</span>
                </button>
                <button onclick="window.print()" class="flex items-center space-x-2 px-5 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold text-slate-700 transition shadow-sm hover:shadow-md">
                    <i data-lucide="printer" class="w-4 h-4 text-slate-600"></i><span>列印報告</span>
                </button>
            </div>
        </header>

        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <div class="table-container">
                <table class="w-full text-left border-separate border-spacing-0" id="main-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                            <th class="px-2 py-4 sticky-col-num border-b">編號</th>
                            <th class="px-4 py-4 sticky-col-name border-b">績效指標內容</th>
                            <th class="px-4 py-4 min-w-[250px] border-b border-l">計算方式</th>
                            <th class="px-2 py-4 text-center min-w-[60px] border-b border-l">時程規劃</th>
                            <th class="px-2 py-4 text-center min-w-[60px] border-b border-l">目標值</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">1月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">2月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">3月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">4月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">5月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">6月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">7月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">8月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">9月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">10月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">11月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[65px]">12月</th>
                            <th id="admin-header-action" class="hidden px-2 py-4 text-center border-b border-l text-red-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white"></tbody>
                </table>
            </div>
            <div id="admin-add-section" class="hidden mt-4">
                <button onclick="addNewRow()" class="flex items-center space-x-2 px-4 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 transition font-bold text-sm">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>新增績效指標項目</span>
                </button>
            </div>
        </div>
        <footer class="bg-white border-t border-slate-200 px-8 py-3 flex justify-between items-center text-[11px] font-bold text-slate-400 no-print">
    <div>© 2026 職業安全衛生室｜職業安全績效管理系統</div>
    <div>Developed by Sam Sun</div>
</footer>
    </main>

    <!-- 排序選單 -->
    <div id="sort-menu" class="sort-menu no-print">
        <button id="move-up-btn" onclick="moveRow('up')"><i data-lucide="arrow-up" class="w-3 h-3 inline mr-2"></i>上移項目</button>
        <button id="move-down-btn" onclick="moveRow('down')"><i data-lucide="arrow-down" class="w-3 h-3 inline mr-2"></i>下移項目</button>
    </div>

    <!-- 管理員驗證彈窗 -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-8">
                <div id="login-view">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-slate-100 p-3 rounded-full mb-4">
                            <i data-lucide="lock-keyhole" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">管理員權限驗證</h3>
                        <p class="text-sm text-slate-500 mt-1">請輸入系統存取密碼以解鎖編輯欄位</p>
                    </div>
                    <div class="space-y-4">
                        <input type="password" id="login-password" 
                               class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition outline-none text-center text-xl tracking-[0.5em]" 
                               placeholder="••••"
                               onkeyup="if(event.key === 'Enter') attemptLogin()">
                        <div class="flex space-x-2">
                            <button onclick="closeLoginModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition text-sm">取消</button>
                            <button onclick="attemptLogin()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition text-sm">解鎖編輯</button>
                        </div>
                        <button onclick="togglePasswordView(true)" class="w-full text-xs text-slate-400 hover:text-blue-500 transition py-1">需要修改管理密碼？</button>
                        <p id="login-error" class="text-center text-red-500 text-xs font-bold hidden">密碼錯誤，請重新輸入</p>
                    </div>
                </div>

                <div id="change-pwd-view" class="hidden">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-yellow-50 p-3 rounded-full mb-4">
                            <i data-lucide="key-round" class="w-8 h-8 text-yellow-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">修改管理密碼</h3>
                        <p class="text-sm text-slate-500 mt-1">需先輸入舊密碼驗證身份</p>
                    </div>
                    <div class="space-y-3">
                        <input type="password" id="old-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="目前的密碼">
                        <input type="password" id="new-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="設定新密碼">
                        <div class="flex space-x-2 pt-2">
                            <button onclick="togglePasswordView(false)" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold hover:bg-slate-200 transition text-xs">返回</button>
                            <button onclick="handleChangePassword()" class="flex-1 py-2 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600 transition text-xs">確認修改</button>
                        </div>
                        <p id="pwd-change-error" class="text-center text-red-500 text-[10px] font-bold hidden"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 附件管理彈窗 -->
    <div id="attachment-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-[440px] rounded-[2.5rem] shadow-2xl overflow-hidden p-8 relative animate-in fade-in zoom-in duration-200">
            <button onclick="closeAttachmentModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 transition">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center space-x-3 mb-6">
                <i data-lucide="link" class="w-6 h-6 text-blue-600 rotate-45"></i>
                <h3 class="text-xl font-bold text-slate-800 tracking-tight">附件與快速填充</h3>
            </div>
            <div class="mb-6">
                <label class="text-[12px] font-bold text-slate-400 mb-2 block">目前選擇</label>
                <div class="bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 flex justify-between items-center">
                    <span id="target-label-display" class="text-slate-700 font-medium">載入中...</span>
                    <button id="delete-single-attachment-btn" onclick="deleteSingleAttachment()" class="hidden text-red-400 hover:text-red-600 transition p-1" title="刪除此筆附件">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="mb-8">
                <label class="text-[12px] font-bold text-slate-400 mb-2 block">連結電腦 PDF / PNG / JPG 檔案</label>
                <div class="flex items-center space-x-3">
                    <div id="upload-status-box" 
                         onclick="document.getElementById('file-input').click()"
                         class="flex-1 border-2 border-dashed border-blue-200 bg-blue-50/30 rounded-2xl py-5 px-4 flex items-center justify-center space-x-2 cursor-pointer hover:bg-blue-50 transition group relative">
                        <i id="upload-icon-status" data-lucide="cloud-upload" class="w-5 h-5 text-blue-500"></i>
                        <span id="upload-text-status" class="text-blue-600 font-bold text-sm">點擊或拖移檔案至此</span>
                    </div>
                    <button onclick="viewCurrentFile()" id="view-file-btn" class="hidden h-[60px] w-[60px] flex items-center justify-center bg-slate-50 border border-slate-100 rounded-2xl text-slate-400 hover:text-blue-600 transition">
                        <i data-lucide="external-link" class="w-6 h-6"></i>
                    </button>
                </div>
                <input type="file" id="file-input" class="hidden" accept=".pdf,.png,.jpg,.jpeg" onchange="handleFileUpload(this)">
            </div>
            <hr class="border-slate-100 mb-6">
            <div class="mb-8">
                <label class="text-[12px] font-bold text-slate-400 mb-3 block">快速大量填充 (批次操作)</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="batchApplyToFile()" class="bg-[#1e293b] text-white py-3.5 rounded-xl text-[13px] font-bold hover:bg-slate-700 transition">
                        將此檔案套用全年度
                    </button>
                    <button onclick="batchClearRowAttachments()" class="bg-[#fff1f2] text-[#f43f5e] py-3.5 rounded-xl text-[13px] font-bold hover:bg-red-100 transition border border-red-50">
                        清除此指標所有附件
                    </button>
                </div>
            </div>
            <button onclick="closeAttachmentModal()" class="w-full py-4 bg-[#2563eb] text-white rounded-[1.2rem] font-bold text-base shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition">
                完成並關閉
            </button>
        </div>
    </div>

    <script>
        // 初始數據定義
        let appData = {
            plan: [
                { id: "1", name: "工作場所巡視結果符合率", content: "巡視結果符合率% =〔1-(缺點件數 / 總件數) 〕x100%", schedule: "適時", target: "90%" },
                { id: "2", name: "職業安全衛生教育訓練", content: "新進人員到職後實施實施3小時安全衛生教育訓練", schedule: "適時", target: "100%" },
                { id: "3", name: "職業安全衛生委員會或管審會", content: "依職業安全衛生管理辦法第12條規定，委員會每3個月至少開會1次。", schedule: "季", target: "100%" },
                { id: "4", name: "安衛相關建議提案改善件數", content: "提案改善率% = 〔1-(逾期件數 / 總件數) 〕x100 %", schedule: "適時", target: "90%" },
                { id: "5", name: "虛驚事故", content: "虛驚事件改善率% = 〔1-(逾期件數 / 總件數) 〕x100%", schedule: "適時", target: "70%" },
                { id: "6", name: "安衛證照設置符合率", content: "環安衛證照設置符合率 = 實際證照數 / 法令規定證照數 x100%", schedule: "適時", target: "100%" },
                { id: "7", name: "人員證照相關", content: "協助同仁於證照有效期限滿前辦理回訓報名。", schedule: "適時", target: "100%" },
                { id: "8", name: "安全衛生緊急應變計畫演練", content: "定期規劃實施演練以降低事故損失。", schedule: "年", target: "100%" },
                { id: "9", name: "消防防護計畫", content: "製定消防防護計畫，報請消防機關核備。", schedule: "月", target: "100%" },
                { id: "10", name: "自動檢查計畫", content: "定期更新新安全衛生自動檢查計畫。", schedule: "月", target: "100%" },
                { id: "11", name: "作業安全管理", content: "高風險作業現場安全查核符合率%。", schedule: "月", target: "100%" },
                { id: "12", name: "變更管理風險評估", content: "MOC 風階評估完成率%。", schedule: "適時", target: "100%" },
                { id: "13", name: "安衛自動檢查檢核符合率", content: "安衛自動檢查檢核符合率 = 累積合格單位數/受檢單位數x100%", schedule: "適時", target: "90%" },

        const titles = { plan: "職業安全衛生管理計畫", iso: "ISO 45001 管理審查", protect: "四大保護計畫", passive: "被動性指標", monitor: "自主監測及主動回報" };

        // --- IndexedDB ---
        const DB_NAME = "OSPMS_DB";
        const DB_VERSION = 1;
        const STORE_KEY = "main_data";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_KEY)) db.createObjectStore(STORE_KEY);
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject("DB Open Error");
            });
        }

        async function loadFromStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_KEY, "readonly");
                const store = transaction.objectStore(STORE_KEY);
                const getRequest = (key) => new Promise((res) => {
                    const req = store.get(key);
                    req.onsuccess = () => res(req.result);
                });
                const savedData = await getRequest('ospms_data_store');
                if (savedData) tableDataStore = savedData;
                const savedAttach = await getRequest('ospms_attachments');
                if (savedAttach) attachmentsStore = savedAttach;
                const savedBaseData = await getRequest('ospms_base_data');
                if (savedBaseData) Object.keys(savedBaseData).forEach(k => { if(appData[k]) appData[k] = savedBaseData[k]; });
                initNav(); 
                switchTab('plan');
                initDragAndDrop();
            } catch (err) {
                console.error("Load Error:", err);
                initNav(); 
                switchTab('plan');
            }
        }

        async function persistToStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_KEY, "readwrite");
                const store = transaction.objectStore(STORE_KEY);
                store.put(tableDataStore, 'ospms_data_store');
                store.put(attachmentsStore, 'ospms_attachments');
                store.put(appData, 'ospms_base_data');
                return new Promise((resolve) => { transaction.oncomplete = () => resolve(); });
            } catch (err) { console.error("Save Error:", err); }
        }

        // --- 功能模組 ---

        function exportJSON() {
            const dataToExport = { data_store: tableDataStore, attachments: attachmentsStore, base_data: appData, export_date: new Date().toLocaleString() };
            const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `OSPMS_Backup_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file || !confirm("導入將會覆蓋目前所有數據，確定嗎？")) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    tableDataStore = imported.data_store || {};
                    attachmentsStore = imported.attachments || {};
                    appData = imported.base_data || appData;
                    await persistToStorage();
                    window.location.reload();
                } catch (err) { alert("檔案格式錯誤！"); }
            };
            reader.readAsText(file);
        }

        function exportFullReport() {
            try {
                const wb = XLSX.utils.book_new();
                const yearLabel = document.getElementById('year-input-field').value;
                Object.keys(titles).forEach(key => {
                    const sheetName = titles[key].substring(0, 31);
                    const baseInfo = appData[key];
                    const savedValues = tableDataStore[key] || [];
                    const headers = ["編號", "績效指標內容", "計算方式", "時程規劃", "目標值", "1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
                    const rows = [headers];
                    baseInfo.forEach((item, idx) => {
                        const rowSaved = savedValues[idx] || [];
                        const excelRow = [item.id, item.name, item.content, rowSaved[0] || item.schedule, rowSaved[1] || item.target];
                        for (let i = 2; i <= 13; i++) { excelRow.push(rowSaved[i] || ""); }
                        rows.push(excelRow);
                    });
                    const ws = XLSX.utils.aoa_to_sheet(rows);
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });
                XLSX.writeFile(wb, `OSPMS_${yearLabel}_全年度績效報表.xlsx`);

            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = '';

        function switchTab(type) {
            if (isAdmin) saveCurrentTabData();
            currentTab = type;
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-white', 'bg-slate-800', 'border-blue-500');
                btn.classList.add('text-slate-400', 'border-transparent');

            const activeBtn = document.getElementById(`tab-${type}`);
            if (activeBtn) activeBtn.classList.add('text-white', 'bg-slate-800', 'border-blue-500');
            document.getElementById('current-category-title').innerText = titles[type];
            renderTable(type);

        function saveCurrentTabData() {
            const rows = document.querySelectorAll("#table-body tr");
            const data = [];
            rows.forEach((tr, idx) => {
                const inputs = Array.from(tr.querySelectorAll(".input-cell")).map(i => i.value);
                data.push(inputs);
                if (isAdmin) {
                    const nameInput = tr.querySelector('.admin-name-input');
                    const contentInput = tr.querySelector('.admin-content-input');
                    if (nameInput && contentInput) {
                        if (!appData[currentTab][idx]) appData[currentTab][idx] = {};
                        // ID 由編號功能控制，其餘由輸入框控制
                        appData[currentTab][idx].name = nameInput.value;
                        appData[currentTab][idx].content = contentInput.value;
                    }
                }
            });
            tableDataStore[currentTab] = data;
        }

        function renderTable(type) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            const savedData = tableDataStore[type] || [];
            const headerAction = document.getElementById('admin-header-action');
            const adminSection = document.getElementById('admin-add-section');
            const saveBtn = document.getElementById('save-logout-btn');

            if (isAdmin) { 
                headerAction.classList.remove('hidden'); adminSection.classList.remove('hidden'); saveBtn.classList.remove('hidden');
            } else { 
                headerAction.classList.add('hidden'); adminSection.classList.add('hidden'); saveBtn.classList.add('hidden');
            }

            appData[type].forEach((item, rowIndex) => {
                // 自動重新校準編號 (依序遞增)
                item.id = (rowIndex + 1).toString();
                
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50/50 group transition-colors";
                const rowSaved = savedData[rowIndex] || [];
                
                let monthCells = "";
                for (let i = 1; i <= 12; i++) {
                    const val = rowSaved[i+1] !== undefined ? rowSaved[i+1] : "";
                    const hasAttach = attachmentsStore[type] && attachmentsStore[type][rowIndex] && attachmentsStore[type][rowIndex][i];
                    const btnClass = hasAttach ? 'has-file' : 'no-file';

                    monthCells += `<td class="px-1 py-2 border-l border-b relative">
                        <input type="text" class="input-cell" placeholder="-" value="${val}"
                               ${!isAdmin ? 'disabled' : ''}
                               onchange="handleInputChange(this)" onblur="appendPercentage(this)"
                               onkeydown="handleKeyDown(event, this)">
                        <span class="attachment-btn ${btnClass}" onclick="handleAttachmentClick(${rowIndex}, ${i})">
                            <i data-lucide="link"></i>
                        </span>
                    </td>`;
                }

                // 修改編號欄位，管理模式下點擊觸發排序選單
                const idContent = isAdmin 
                    ? `<button onclick="toggleSortMenu(event, ${rowIndex})" class="w-full h-full bg-yellow-50 hover:bg-yellow-200 transition-colors font-bold text-slate-700 py-2 rounded border border-yellow-200">${item.id}</button>` 
                    : item.id;

                const nameHTML = isAdmin ? `<textarea class="admin-name-input w-full text-[11px] leading-tight admin-edit-cell rounded p-1 h-12" oninput="autoResize(this)">${item.name}</textarea>` : `<div class="text-[11px] font-bold leading-tight text-slate-600">${item.name}</div>`;
                const contentHTML = isAdmin ? `<textarea class="admin-content-input w-full text-[10px] leading-normal admin-edit-cell rounded p-1 h-12" oninput="autoResize(this)">${item.content}</textarea>` : `<div class="text-[10px] text-slate-600 leading-normal">${item.content}</div>`;

                row.innerHTML = `
                    <td class="px-1 py-1 text-[10px] sticky-col-num border-b">${idContent}</td>

                    <td class="px-1 py-2 border-l border-b bg-white group-hover:bg-slate-50/50">
                        <input type="text" class="input-cell font-light" value="${rowSaved[0] || item.schedule}" ${!isAdmin ? 'disabled' : ''} onkeydown="handleKeyDown(event, this)">
                    </td>
                    <td class="px-1 py-2 border-l border-b bg-white group-hover:bg-slate-50/50">
                        <input type="text" class="input-cell font-light" value="${rowSaved[1] || item.target}" ${!isAdmin ? 'disabled' : ''} onblur="appendPercentage(this)" onkeydown="handleKeyDown(event, this)">

                        <button onclick="deleteRow(${rowIndex})" class="text-red-400 hover:text-red-600 transition"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>

        // --- 排序功能邏輯 ---

        function toggleSortMenu(e, idx) {
            e.stopPropagation();
            const menu = document.getElementById('sort-menu');
            activeSortRowIdx = idx;
            
            // 檢查是否為第一條或最後一條，若是則禁用對應按鈕
            const list = appData[currentTab];
            document.getElementById('move-up-btn').disabled = (idx === 0);
            document.getElementById('move-down-btn').disabled = (idx === list.length - 1);

            menu.style.display = 'block';
            menu.style.left = `${e.pageX}px`;
            menu.style.top = `${e.pageY}px`;

            // 點擊外面自動關閉
            const closeMenu = () => { menu.style.display = 'none'; document.removeEventListener('click', closeMenu); };
            setTimeout(() => document.addEventListener('click', closeMenu), 0);
        }

        async function moveRow(direction) {
            if (activeSortRowIdx === null) return;
            
            // 排序前先儲存目前的輸入值到 Store
            saveCurrentTabData();
            
            const targetIdx = direction === 'up' ? activeSortRowIdx - 1 : activeSortRowIdx + 1;
            const list = appData[currentTab];
            const dataStoreList = tableDataStore[currentTab] || [];
            const attachStoreList = attachmentsStore[currentTab] || {};

            if (targetIdx < 0 || targetIdx >= list.length) return;

            // 1. 交換基礎數據 (appData)
            const tempBase = list[activeSortRowIdx];
            list[activeSortRowIdx] = list[targetIdx];
            list[targetIdx] = tempBase;

            // 2. 交換輸入內容數據 (tableDataStore)
            if (dataStoreList.length > 0) {
                const tempVal = dataStoreList[activeSortRowIdx];
                dataStoreList[activeSortRowIdx] = dataStoreList[targetIdx];
                dataStoreList[targetIdx] = tempVal;
            }

            // 3. 交換附件數據 (attachmentsStore)
            const tempAttach = attachStoreList[activeSortRowIdx];
            if (attachStoreList[targetIdx]) {
                attachStoreList[activeSortRowIdx] = attachStoreList[targetIdx];
            } else {
                delete attachStoreList[activeSortRowIdx];
            }
            if (tempAttach) {
                attachStoreList[targetIdx] = tempAttach;
            } else {
                delete attachStoreList[targetIdx];
            }

            // 更新排序標記並持久化
            activeSortRowIdx = null;
            await persistToStorage();
            
            // 重新渲染畫面
            renderTable(currentTab);
        }

        // --- 附件功能 ---

        function handleAttachmentClick(rowIndex, monthIndex) {
            if (isAdmin) { openAttachmentModal(rowIndex, monthIndex); } 
            else { const file = attachmentsStore[currentTab]?.[rowIndex]?.[monthIndex]; if (file) viewFileDirectly(file); }
        }

        function openAttachmentModal(rowIndex, monthIndex) {
            activeAttachmentTarget = { row: rowIndex, month: monthIndex };
            const item = appData[currentTab][rowIndex];
            document.getElementById('target-label-display').innerText = `${item.name} - ${monthIndex}月`;
            const modal = document.getElementById('attachment-modal');
            const statusBox = document.getElementById('upload-status-box');
            const statusIcon = document.getElementById('upload-icon-status');
            const statusText = document.getElementById('upload-text-status');
            const viewBtn = document.getElementById('view-file-btn');
            const deleteSingleBtn = document.getElementById('delete-single-attachment-btn');
            modal.classList.remove('hidden');
            const existing = attachmentsStore[currentTab] && attachmentsStore[currentTab][rowIndex] && attachmentsStore[currentTab][rowIndex][monthIndex];
            if (existing) {
                statusBox.classList.replace('border-blue-200', 'border-blue-400'); statusBox.classList.add('bg-blue-50');
                statusIcon.setAttribute('data-lucide', 'check-circle'); statusText.innerText = "檔案已就緒 (可再拖移更換)";
                viewBtn.classList.remove('hidden'); deleteSingleBtn.classList.remove('hidden');
            } else {
                statusBox.classList.replace('border-blue-400', 'border-blue-200'); statusBox.classList.remove('bg-blue-50');
                statusIcon.setAttribute('data-lucide', 'cloud-upload'); statusText.innerText = "點擊或拖移檔案至此";
                viewBtn.classList.add('hidden'); deleteSingleBtn.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function closeAttachmentModal() { document.getElementById('attachment-modal').classList.add('hidden'); document.getElementById('file-input').value = ''; activeAttachmentTarget = null; }

        function initDragAndDrop() {
            const dropZone = document.getElementById('upload-status-box');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.add('drag-over'), false));
            ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.remove('drag-over'), false));
            dropZone.addEventListener('drop', e => { const files = e.dataTransfer.files; if (files.length > 0) processFile(files[0]); }, false);
        }

        function processFile(file) {
            if (!file) return;
            if (!['application/pdf', 'image/png', 'image/jpeg', 'image/jpg'].includes(file.type)) { alert("不支援此格式！"); return; }
            if (file.size > 10 * 1024 * 1024) { alert("檔案太大 (限 10MB)"); return; }
            const reader = new FileReader();
            reader.onload = async function(e) {
                if (!attachmentsStore[currentTab]) attachmentsStore[currentTab] = {};
                if (!attachmentsStore[currentTab][activeAttachmentTarget.row]) attachmentsStore[currentTab][activeAttachmentTarget.row] = {};
                attachmentsStore[currentTab][activeAttachmentTarget.row][activeAttachmentTarget.month] = { name: file.name, type: file.type, data: e.target.result };
                saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month);
            };
            reader.readAsDataURL(file);
        }

        function handleFileUpload(input) { processFile(input.files[0]); }
        function viewFileDirectly(file) {
            const win = window.open();
            if (file.type === 'application/pdf') win.document.write(`<iframe src="${file.data}" frameborder="0" style="position:fixed; top:0; left:0; width:100%; height:100%;" allowfullscreen></iframe>`); 
            else win.document.write(`<div style="background:#f1f5f9; min-height:100vh; display:flex; justify-content:center; align-items:center;"><img src="${file.data}" style="max-width:90%; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);"></div>`); 
        }
        function viewCurrentFile() { const f = attachmentsStore[currentTab][activeAttachmentTarget.row][activeAttachmentTarget.month]; if (f) viewFileDirectly(f); }

        async function deleteSingleAttachment() {
            if (!activeAttachmentTarget || !confirm("確定刪除？")) return;
            if (attachmentsStore[currentTab]?.[activeAttachmentTarget.row]) {
                delete attachmentsStore[currentTab][activeAttachmentTarget.row][activeAttachmentTarget.month];
                if (Object.keys(attachmentsStore[currentTab][activeAttachmentTarget.row]).length === 0) delete attachmentsStore[currentTab][activeAttachmentTarget.row];
                saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month);
            }
        }

        async function batchApplyToFile() {
            const f = attachmentsStore[currentTab]?.[activeAttachmentTarget.row]?.[activeAttachmentTarget.month];
            if (!f) { alert("請先上傳檔案"); return; }
            if (!confirm("確定套用全年度？")) return;
            if (!attachmentsStore[currentTab][activeAttachmentTarget.row]) attachmentsStore[currentTab][activeAttachmentTarget.row] = {};
            for (let i = 1; i <= 12; i++) attachmentsStore[currentTab][activeAttachmentTarget.row][i] = { ...f };
            saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); alert("套用成功");
        }

        async function batchClearRowAttachments() {
            if (!confirm("確定清除全年度？")) return;
            if (attachmentsStore[currentTab]?.[activeAttachmentTarget.row]) { delete attachmentsStore[currentTab][activeAttachmentTarget.row]; saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); if (activeAttachmentTarget) openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month); }
        }

        // --- 核心邏輯與 UI 互動 ---

        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }

        function handleAuthClick() {
            if (isAdmin) { if (confirm("退出管理模式？")) { isAdmin = false; updateUIState(); renderTable(currentTab); } } 
            else { openLoginModal(); }
        }

        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); togglePasswordView(false); document.getElementById('login-password').focus(); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); document.getElementById('login-password').value = ''; }
        function togglePasswordView(s) {
            const lV = document.getElementById('login-view'); const cV = document.getElementById('change-pwd-view');
            if (s) { lV.classList.add('hidden'); cV.classList.remove('hidden'); } else { lV.classList.remove('hidden'); cV.classList.add('hidden'); }
        }

        function getAdminPassword() { return localStorage.getItem('ospms_admin_pwd') || '1068'; }

        function attemptLogin() {
            if (document.getElementById('login-password').value === getAdminPassword()) { isAdmin = true; updateUIState(); closeLoginModal(); renderTable(currentTab); } 
            else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function handleChangePassword() {
            const old = document.getElementById('old-password').value; const newP = document.getElementById('new-password').value; const err = document.getElementById('pwd-change-error');
            err.classList.add('hidden'); if (old !== getAdminPassword()) { err.innerText = "舊密碼不正確"; err.classList.remove('hidden'); return; }
            if (newP.length < 4) { err.innerText = "至少 4 位數"; err.classList.remove('hidden'); return; }
            localStorage.setItem('ospms_admin_pwd', newP); alert("修改成功"); togglePasswordView(false);
        }

        function updateUIState() {
            const icon = document.getElementById('auth-icon'); const badge = document.getElementById('admin-badge');
            if (isAdmin) { icon.setAttribute('data-lucide', 'unlock'); icon.classList.replace('text-slate-500', 'text-orange-500'); badge.classList.remove('hidden'); } 
            else { icon.setAttribute('data-lucide', 'lock'); icon.classList.replace('text-orange-500', 'text-slate-500'); badge.classList.add('hidden'); }
            lucide.createIcons();
        }

        async function saveAndLogout() { saveCurrentTabData(); await persistToStorage(); isAdmin = false; updateUIState(); renderTable(currentTab); alert("已儲存並登出"); }

        function addNewRow() { saveCurrentTabData(); appData[currentTab].push({ id: (appData[currentTab].length + 1).toString(), name: "新項目", content: "內容描述", schedule: "適時", target: "100%" }); renderTable(currentTab); }
        async function deleteRow(idx) { if (confirm("確定刪除？")) { saveCurrentTabData(); appData[currentTab].splice(idx, 1); if (attachmentsStore[currentTab]?.[idx]) delete attachmentsStore[currentTab][idx]; await persistToStorage(); renderTable(currentTab); } }

        function handleYearFormat(input) {
            let val = input.value.trim(); let match = val.match(/\d+/);
            if (match) { let y = parseInt(match[0]); if (y > 1911) input.value = `${y}年度 (${y - 1911}年)`; else input.value = `${y + 1911}年度 (${y}年)`; }
        }

        function appendPercentage(input) {
            let v = input.value.trim();
            if (v !== "" && v !== "-" && v !== "N/A" && !isNaN(v)) { input.value = v + "%"; formatInput(input); }
        }

        function handleInputChange(input) {
            let val = input.value.trim(); if (val.toUpperCase() === 'N') input.value = 'N/A';
            formatInput(input);
        }

        function formatInput(input) { input.style.color = '#475569'; }

        function handleKeyDown(e, input) {
            const cell = input.parentElement; const row = cell.parentElement; const tbody = row.parentElement; const cells = Array.from(row.cells); const rows = Array.from(tbody.rows);
            const rIdx = rows.indexOf(row); const cIdx = cells.indexOf(cell);
            if (e.key === "Enter" || e.key === "ArrowDown") { e.preventDefault(); if (rIdx < rows.length - 1) rows[rIdx + 1].cells[cIdx].querySelector('input')?.focus(); } 
            else if (e.key === "ArrowUp") { e.preventDefault(); if (rIdx > 0) rows[rIdx - 1].cells[cIdx].querySelector('input')?.focus(); }
            else if (e.key === "ArrowRight") { if (input.selectionStart === input.value.length && cIdx < cells.length - 1) { const next = cells[cIdx + 1].querySelector('input'); if (next) { e.preventDefault(); next.focus(); next.select(); } } }
            else if (e.key === "ArrowLeft") { if (input.selectionStart === 0 && cIdx > 0) { const prev = cells[cIdx - 1].querySelector('input'); if (prev) { e.preventDefault(); prev.focus(); prev.select(); } } }
        }

        window.onload = () => { loadFromStorage(); };
    </script>
</body>
</html>
