<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全績效管理系統 (OSPMS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Excel 匯出庫 -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow: hidden; }
        
        .sidebar { width: 280px; flex-shrink: 0; }

        .table-container { 
            overflow: auto; 
            height: calc(100vh - 160px); 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .sticky-col-num { position: sticky; left: 0; z-index: 25; background: #fff; min-width: 40px; text-align: center; }
        .sticky-col-name { position: sticky; left: 40px; z-index: 25; background: #fff; border-right: 2px solid #f1f5f9; min-width: 150px; }

        tr:hover .sticky-col-num, tr:hover .sticky-col-name { background-color: #f8fafc; }

        thead th { position: sticky; top: 0; z-index: 30; background: #f1f5f9; }
        thead th.sticky-col-num { z-index: 41; left: 0; }
        thead th.sticky-col-name { z-index: 40; left: 40px; }

        .input-cell { 
            width: 100%; 
            text-align: center; 
            border: 1px solid transparent; 
            border-radius: 4px; 
            padding: 4px 1px; 
            font-size: 11px; 
            transition: all 0.2s;
            background: transparent;
        }
        .input-cell:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .input-cell:not(:disabled):hover { border-color: #cbd5e1; background: #fff; }
        .input-cell:not(:disabled):focus { border-color: #3b82f6; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .admin-edit-cell { background-color: #fefce8 !important; border: 1px dashed #eab308 !important; }

        .year-input {
            background: #dbeafe;
            color: #1d4ed8;
            border: 2px solid transparent;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            width: 180px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        @media print {
            @page { size: A4 landscape; margin: 0.5cm; }
            .no-print { display: none !important; }
            body { background-color: white !important; overflow: visible !important; height: auto !important; }
            .table-container { overflow: visible !important; height: auto !important; width: 100% !important; box-shadow: none !important; }
            table { table-layout: fixed; width: 100% !important; font-size: 9px !important; }
            .sticky-col-num, .sticky-col-name { position: static !important; background: white !important; }
            th, td { padding: 4px 2px !important; border: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body class="text-slate-800 flex h-screen">

    <aside class="sidebar bg-slate-900 flex flex-col no-print">
        <div class="p-6 border-b border-slate-800">
            <div class="flex justify-between items-start">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-xl">
                        <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-white tracking-tight leading-none">OSPMS</h1>
                        <p class="text-[8px] text-blue-400 font-bold uppercase tracking-tighter mt-1">Occupational Safety Performance Management System</p>
                    </div>
                </div>
                <!-- 鎖頭按鈕：用於切換登入/登出 -->
                <button id="admin-toggle-btn" onclick="handleAuthClick()" class="text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="lock" class="w-5 h-5" id="auth-icon"></i>
                </button>
            </div>
            <p class="text-[12px] text-slate-300 font-bold mt-4">職業安全績效管理系統</p>
        </div>
        
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">系統分類目錄</span>
            </div>
            <div class="space-y-1" id="nav-tabs"></div>
        </nav>

        <div class="p-4 bg-slate-800/30 space-y-2">
            <div id="admin-badge" class="hidden px-4 py-2 bg-yellow-500/10 border border-yellow-500/20 rounded-lg mb-2">
                <p class="text-[10px] text-yellow-500 font-bold text-center">管理員編輯模式</p>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="exportJSON()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="file-json" class="w-3 h-3"></i><span>導出數據庫</span>
                </button>
                <button onclick="document.getElementById('import-input').click()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="upload" class="w-3 h-3"></i><span>導入數據庫</span>
                </button>
                <input type="file" id="import-input" class="hidden" accept=".json" onchange="importJSON(this)">
            </div>

            <button class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 hover:bg-blue-500 transition" onclick="exportFullReport()">
                <i data-lucide="download" class="w-4 h-4"></i><span>匯出全年度績效報表 (Excel)</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white px-8 py-5 border-b border-slate-200 flex justify-between items-center shrink-0">
            <div>
                <h2 id="current-category-title" class="text-xl font-black text-slate-900 tracking-tight leading-none">載入中...</h2>
                <div class="flex items-center mt-2">
                    <input type="text" id="year-input-field" class="year-input" value="2026年度 (115年)" 
                           onclick="this.select()" 
                           onblur="handleYearFormat(this)"
                           onkeydown="if(event.key === 'Enter') handleYearFormat(this)">
                </div>
            </div>
            <div class="flex items-center space-x-3 no-print">
                <button id="save-logout-btn" onclick="saveAndLogout()" class="hidden flex items-center space-x-2 px-5 py-2.5 bg-green-600 text-white rounded-full text-sm font-bold transition shadow-sm hover:bg-green-700">
                    <i data-lucide="save" class="w-4 h-4"></i><span>儲存並登出系統</span>
                </button>
                <button onclick="window.print()" class="flex items-center space-x-2 px-5 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold text-slate-700 transition shadow-sm hover:shadow-md">
                    <i data-lucide="printer" class="w-4 h-4 text-slate-600"></i><span>列印報告</span>
                </button>
            </div>
        </header>

        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <div class="table-container">
                <table class="w-full text-left border-separate border-spacing-0" id="main-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                            <th class="px-2 py-4 sticky-col-num border-b">編號</th>
                            <th class="px-4 py-4 sticky-col-name border-b">績效指標內容</th>
                            <th class="px-4 py-4 min-w-[250px] border-b border-l">計算方式</th>
                            <th class="px-2 py-4 text-center min-w-[60px] border-b border-l">時程規劃</th>
                            <th class="px-2 py-4 text-center min-w-[60px] border-b border-l">目標值</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">1月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">2月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">3月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">4月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">5月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">6月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">7月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">8月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">9月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">10月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">11月</th>
                            <th class="px-1 py-4 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[50px]">12月</th>
                            <th id="admin-header-action" class="hidden px-2 py-4 text-center border-b border-l text-red-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white"></tbody>
                </table>
            </div>
            <div id="admin-add-section" class="hidden mt-4">
                <button onclick="addNewRow()" class="flex items-center space-x-2 px-4 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 transition font-bold text-sm">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>新增績效指標項目</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 管理員驗證與修改密碼彈窗 -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-8">
                <!-- 登入介面 -->
                <div id="login-view">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-slate-100 p-3 rounded-full mb-4">
                            <i data-lucide="lock-keyhole" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">管理員權限驗證</h3>
                        <p class="text-sm text-slate-500 mt-1">請輸入系統存取密碼以解鎖編輯欄位</p>
                    </div>
                    <div class="space-y-4">
                        <input type="password" id="login-password" 
                               class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition outline-none text-center text-xl tracking-[0.5em]" 
                               placeholder="••••"
                               onkeyup="if(event.key === 'Enter') attemptLogin()">
                        <div class="flex space-x-2">
                            <button onclick="closeLoginModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition text-sm">取消</button>
                            <button onclick="attemptLogin()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition text-sm">解鎖編輯</button>
                        </div>
                        <button onclick="togglePasswordView(true)" class="w-full text-xs text-slate-400 hover:text-blue-500 transition py-1">需要修改管理密碼？</button>
                        <p id="login-error" class="text-center text-red-500 text-xs font-bold hidden">密碼錯誤，請重新輸入</p>
                    </div>
                </div>

                <!-- 修改密碼介面 -->
                <div id="change-pwd-view" class="hidden">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-yellow-50 p-3 rounded-full mb-4">
                            <i data-lucide="key-round" class="w-8 h-8 text-yellow-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">修改管理密碼</h3>
                        <p class="text-sm text-slate-500 mt-1">需先輸入舊密碼驗證身份</p>
                    </div>
                    <div class="space-y-3">
                        <input type="password" id="old-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="目前的密碼">
                        <input type="password" id="new-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="設定新密碼">
                        <div class="flex space-x-2 pt-2">
                            <button onclick="togglePasswordView(false)" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold hover:bg-slate-200 transition text-xs">返回</button>
                            <button onclick="handleChangePassword()" class="flex-1 py-2 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600 transition text-xs">確認修改</button>
                        </div>
                        <p id="pwd-change-error" class="text-center text-red-500 text-[10px] font-bold hidden"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const appData = {
            plan: [
                { id: "1", name: "工作場所巡視結果符合率", content: "巡視結果符合率% =〔1-(缺點件數 / 總件數) 〕x100%", schedule: "適時", target: "90%" },
                { id: "2", name: "職業安全衛生教育訓練", content: "新進人員到職後實施實施3小時安全衛生教育訓練", schedule: "適時", target: "100%" },
                { id: "3", name: "職業安全衛生委員會或管審會", content: "依職業安全衛生管理辦法第12條規定，委員會每3個月至少開會1次。", schedule: "季", target: "100%" },
                { id: "4", name: "安衛相關建議提案改善件數", content: "提案改善率% = 〔1-(逾期件數 / 總件數) 〕x100 %", schedule: "適時", target: "90%" },
                { id: "5", name: "虛驚事故", content: "虛驚事件改善率% = 〔1-(逾期件數 / 總件數) 〕x100%", schedule: "適時", target: "70%" },
                { id: "6", name: "安衛證照設置符合率", content: "環安衛證照設置符合率 = 實際證照數 / 法令規定證照數 x100%", schedule: "適時", target: "100%" },
                { id: "7", name: "人員證照相關", content: "協助同仁於證照有效期限滿前辦理回訓報名。", schedule: "適時", target: "100%" },
                { id: "8", name: "安全衛生緊急應變計畫演練", content: "定期規劃實施演練以降低事故損失。", schedule: "年", target: "100%" },
                { id: "9", name: "消防防護計畫", content: "製定消防防護計畫，報請消防機關核備。", schedule: "月", target: "100%" },
                { id: "10", name: "自動檢查計畫", content: "定期更新新安全衛生自動檢查計畫。", schedule: "月", target: "100%" },
                { id: "11", name: "作業安全管理", content: "高風險作業現場安全查核符合率%。", schedule: "月", target: "100%" },
                { id: "12", name: "變更管理風險評估", content: "MOC 風險評估完成率%。", schedule: "適時", target: "100%" },
                { id: "13", name: "安衛自動檢查檢核符合率", content: "安衛自動檢查檢核符合率 = 累積合格單位數/受檢單位數x100%", schedule: "適時", target: "90%" },
                { id: "14", name: "定期實施一般健康檢查", content: "依法定年齡區間定期實施一般健康檢查。", schedule: "年", target: "100%" },
                { id: "15", name: "特殊作業人員檢查計畫", content: "每年實施特殊健康檢查。", schedule: "年", target: "100%" },
                { id: "16", name: "員工健康風險評估", content: "針對特殊作業人員追蹤異常指標。", schedule: "年", target: "100%" },
                { id: "17", name: "辦理臨場醫護諮詢服務", content: "特約醫護人員臨場諮詢服務。", schedule: "適時", target: "100%" },
                { id: "18", name: "危害性化學品清單及SDS安全資料表", content: "至少每三年檢討一次安全資料表內容。", schedule: "月", target: "100%" },
                { id: "19", name: "安全作業標準", content: "擬訂安全衛生作業標準並定期更新。", schedule: "月", target: "100%" },
                { id: "20", name: "有機溶劑儲藏室危險區域劃分", content: "定期更新危險區域劃分平面圖。", schedule: "季", target: "100%" },
                { id: "21", name: "承攬、採購、變更管理", content: "執行工作環境或作業危害之辨識、協議管理等。", schedule: "適時", target: "100%" },
                { id: "22", name: "承攬商違規改善追蹤", content: "承攬商違規改善追蹤率%。", schedule: "適時", target: "100%" },
                { id: "23", name: "主管機關函文公告", content: "將主管機關函文公告並通報。", schedule: "適時", target: "100%" }
            ],
            iso: [
                { id: "1", name: "職安風險評估作業盤查", content: "建立、實施及維持風險評估管理計畫。", schedule: "適時", target: "100%" },
                { id: "2", name: "職安風險與機會評估", content: "依規範執行工作環境或作業危害的辨識與控制。", schedule: "適時", target: "100%" },
                { id: "3", name: "職業安全衛生法規鑑別", content: "定期每月執行法規鑑別一次。", schedule: "月", target: "100%" },
                { id: "4", name: "職業安全績效指標量測", content: "量測職業安全衛生工作推動之成效。", schedule: "適時", target: "100%" },
                { id: "5", name: "職安管理系統管理審查報告", content: "紀錄於管理審查報告中。", schedule: "適時", target: "100%" },
                { id: "6", name: "ISO45001內外部稽核", content: "定期執行 ISO 45001 之驗證審查。", schedule: "年", target: "100%" }
            ],
            protect: [
                { id: "1", name: "人因性危害預防計畫", content: "分析肌肉骨骼之傷病調查與管控。", schedule: "月", target: "100%" },
                { id: "2", name: "異常工作負荷促發疾病預防", content: "評估工作負荷量是否造成員工過勞。", schedule: "月", target: "100%" },
                { id: "3", name: "執行職務遭受不法侵害預防", content: "調查是否有發生職場暴力之情事。", schedule: "月", target: "100%" },
                { id: "4", name: "母性健康保護計畫", content: "使妊娠中或分娩後員工獲合法安置管理。", schedule: "適時", target: "100%" }
            ],
            passive: [
                { id: "1", name: "失能災害頻率 (FR)", content: "失能傷害人次數 x 1,000,000 / 總經歷工時", schedule: "適時", target: "<0.79" },
                { id: "2", name: "失能災害嚴重率 (SR)", content: "總失能損失日數 x 1,000,000 / 總經歷工時", schedule: "適時", target: "<32" }
            ],
            monitor: [
                { id: "1", name: "作業環境監測計畫", content: "每半年委託監測機構執行監測。", schedule: "半年", target: "100%" },
                { id: "2", name: "作業環境監測申報", content: "向當地主管機關進行核備作業。", schedule: "半年", target: "100%" },
                { id: "3", name: "職業災害定期申報", content: "每月10號前線上申報。", schedule: "月", target: "100%" },
                { id: "4", name: "單位及人員設置報備", content: "每月線上申報確認核備之人員。", schedule: "月", target: "100%" },
                { id: "5", name: "急救箱定期檢查", content: "至少每三個月定期檢查。", schedule: "月", target: "100%" },
                { id: "6", name: "AED 自動檢查", content: "依計畫實施檢查並紀錄。", schedule: "月", target: "100%" },
                { id: "7", name: "化學品進出使用量統計", content: "紀錄有機溶劑進出量。", schedule: "月", target: "100%" },
                { id: "8", name: "危險物有害物分級管理", content: "評估危害程度並採取分級管理。", schedule: "月", target: "100%" },
                { id: "9", name: "幅射防護實化申報", content: "透過輻防雲化系統進行申辦。", schedule: "月", target: "100%" },
                { id: "10", name: "空汙定期申報", content: "確認 100% 合格。", schedule: "季", target: "100%" },
                { id: "11", name: "汙水定期申報", content: "生活廢水及下水道使用申報。", schedule: "半年", target: "100%" },
                { id: "12", name: "土壤及地下汙水申報", content: "定期申報，確認 100% 合格。", schedule: "月", target: "100%" },
                { id: "13", name: "緊急發電機設備檢查", content: "每月定期檢查記錄。", schedule: "月", target: "100%" },
                { id: "14", name: "防爆電氣設備檢查", content: "每月定期實施檢查一次。", schedule: "月", target: "100%" },
                { id: "15", name: "局部排氣裝置檢查", content: "每月定期實施檢查一次。", schedule: "月", target: "100%" },
                { id: "16", name: "個人防護具檢查", content: "每月定期實施檢查一次。", schedule: "月", target: "100%" },
                { id: "17", name: "消防安全檢查", content: "每年實施一次。", schedule: "年", target: "100%" },
                { id: "18", name: "機電安全檢查", content: "每年定期實施檢查一次。", schedule: "年", target: "100%" },
                { id: "19", name: "建築公共安全檢查", content: "每兩年一次申報。", schedule: "2年", target: "100%" }
            ]
        };

        const titles = { plan: "職業安全衛生管理計畫", iso: "ISO 45001 管理審查", protect: "四大保護計畫", passive: "被動性指標", monitor: "自主監測及主動回報" };
        const icons = { plan: "clipboard-list", iso: "award", protect: "user-check", passive: "activity", monitor: "gauge" };

        let currentTab = 'plan';
        let tableDataStore = {};
        let isAdmin = false;

        function loadFromStorage() {
            const saved = localStorage.getItem('ospms_data_store');
            if (saved) tableDataStore = JSON.parse(saved);
            const savedBaseData = localStorage.getItem('ospms_base_data');
            if (savedBaseData) {
                const parsed = JSON.parse(savedBaseData);
                Object.keys(parsed).forEach(k => { if(appData[k]) appData[k] = parsed[k]; });
            }
        }

        function persistToStorage() {
            localStorage.setItem('ospms_data_store', JSON.stringify(tableDataStore));
            localStorage.setItem('ospms_base_data', JSON.stringify(appData));
        }

        function exportJSON() {
            const dataToExport = {
                data_store: JSON.parse(localStorage.getItem('ospms_data_store') || "{}"),
                base_data: JSON.parse(localStorage.getItem('ospms_base_data') || JSON.stringify(appData)),
                export_date: new Date().toLocaleString()
            };
            const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `OSPMS_Backup_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file || !confirm("導入將會覆蓋目前所有數據，確定嗎？")) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    localStorage.setItem('ospms_data_store', JSON.stringify(imported.data_store));
                    localStorage.setItem('ospms_base_data', JSON.stringify(imported.base_data));
                    window.location.reload();
                } catch (err) { alert("檔案格式錯誤！"); }
            };
            reader.readAsText(file);
        }

        function exportFullReport() {
            try {
                const wb = XLSX.utils.book_new();
                const yearLabel = document.getElementById('year-input-field').value;

                Object.keys(titles).forEach(key => {
                    const sheetName = titles[key].substring(0, 31);
                    const baseInfo = appData[key];
                    const savedValues = tableDataStore[key] || [];
                    const headers = ["編號", "績效指標內容", "計算方式", "時程規劃", "目標值", "1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
                    const rows = [headers];
                    baseInfo.forEach((item, idx) => {
                        const rowSaved = savedValues[idx] || [];
                        const excelRow = [item.id, item.name, item.content, rowSaved[0] || item.schedule, rowSaved[1] || item.target];
                        for (let i = 2; i <= 13; i++) { excelRow.push(rowSaved[i] || ""); }
                        rows.push(excelRow);
                    });
                    const ws = XLSX.utils.aoa_to_sheet(rows);
                    ws['!cols'] = [{ wch: 5 }, { wch: 30 }, { wch: 40 }, { wch: 10 }, { wch: 10 }, ...Array(12).fill({ wch: 6 })];
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });
                XLSX.writeFile(wb, `OSPMS_${yearLabel.replace(/[\s\(\)]/g, '')}_全年度績效報表.xlsx`);
            } catch (error) {
                console.error("Excel Export Error:", error);
                alert("匯出 Excel 失敗，請確認是否有異常數據。");
            }
        }

        function initNav() {
            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = '';
            Object.keys(titles).forEach(key => {
                const btn = document.createElement('button');
                btn.id = `tab-${key}`;
                btn.onclick = () => switchTab(key);
                btn.className = "w-full px-6 py-4 text-left text-sm font-bold flex items-center space-x-3 transition border-l-4 border-transparent text-slate-400 hover:text-white hover:bg-slate-800/50";
                btn.innerHTML = `<i data-lucide="${icons[key]}" class="w-4 h-4"></i><span>${titles[key]}</span>`;
                nav.appendChild(btn);
            });
            lucide.createIcons();
        }

        function switchTab(type) {
            if (isAdmin) saveCurrentTabData();
            currentTab = type;
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-white', 'bg-slate-800', 'border-blue-500');
                btn.classList.add('text-slate-400', 'border-transparent');
            });
            const activeBtn = document.getElementById(`tab-${type}`);
            if (activeBtn) activeBtn.classList.add('text-white', 'bg-slate-800', 'border-blue-500');
            document.getElementById('current-category-title').innerText = titles[type];
            renderTable(type);
        }

        function saveCurrentTabData() {
            const rows = document.querySelectorAll("#table-body tr");
            const data = [];
            rows.forEach((tr, idx) => {
                const inputs = Array.from(tr.querySelectorAll(".input-cell")).map(i => i.value);
                data.push(inputs);
                if (isAdmin) {
                    const idInput = tr.querySelector('.admin-id-input');
                    const nameInput = tr.querySelector('.admin-name-input');
                    const contentInput = tr.querySelector('.admin-content-input');
                    if (idInput && nameInput && contentInput) {
                        if (!appData[currentTab][idx]) appData[currentTab][idx] = {};
                        appData[currentTab][idx].id = idInput.value;
                        appData[currentTab][idx].name = nameInput.value;
                        appData[currentTab][idx].content = contentInput.value;
                    }
                }
            });
            tableDataStore[currentTab] = data;
        }

        function renderTable(type) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            const savedData = tableDataStore[type] || [];
            const headerAction = document.getElementById('admin-header-action');
            const adminSection = document.getElementById('admin-add-section');
            const saveBtn = document.getElementById('save-logout-btn');

            if (isAdmin) { 
                headerAction.classList.remove('hidden'); 
                adminSection.classList.remove('hidden'); 
                saveBtn.classList.remove('hidden');
            } else { 
                headerAction.classList.add('hidden'); 
                adminSection.classList.add('hidden'); 
                saveBtn.classList.add('hidden');
            }

            appData[type].forEach((item, rowIndex) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50/50 group transition-colors";
                const rowSaved = savedData[rowIndex] || [];
                let monthCells = "";
                for (let i = 1; i <= 12; i++) {
                    const val = rowSaved[i+1] !== undefined ? rowSaved[i+1] : "";
                    monthCells += `<td class="px-1 py-2 border-l border-b">
                        <input type="text" class="input-cell" placeholder="-" value="${val}"
                               ${!isAdmin ? 'disabled' : ''}
                               onchange="formatInput(this)" onblur="appendPercentage(this)"
                               onkeydown="handleKeyDown(event, this)">
                    </td>`;
                }

                const idHTML = isAdmin ? `<input type="text" class="admin-id-input w-full bg-transparent text-center font-bold admin-edit-cell rounded" value="${item.id}">` : item.id;
                const nameHTML = isAdmin ? `<textarea class="admin-name-input w-full text-[11px] leading-tight admin-edit-cell rounded p-1 h-12" oninput="autoResize(this)">${item.name}</textarea>` : `<div class="text-[11px] font-bold leading-tight">${item.name}</div>`;
                const contentHTML = isAdmin ? `<textarea class="admin-content-input w-full text-[10px] leading-normal admin-edit-cell rounded p-1 h-12" oninput="autoResize(this)">${item.content}</textarea>` : `<div class="text-[10px] text-slate-500 leading-normal">${item.content}</div>`;

                row.innerHTML = `
                    <td class="px-2 py-4 text-[10px] font-bold text-slate-400 sticky-col-num border-b">${idHTML}</td>
                    <td class="px-4 py-4 sticky-col-name border-b">${nameHTML}</td>
                    <td class="px-4 py-4 border-l border-b bg-white group-hover:bg-slate-50/50">${contentHTML}</td>
                    <td class="px-1 py-2 border-l border-b bg-white group-hover:bg-slate-50/50">
                        <input type="text" class="input-cell font-bold text-slate-400" value="${rowSaved[0] || item.schedule}" ${!isAdmin ? 'disabled' : ''} onkeydown="handleKeyDown(event, this)">
                    </td>
                    <td class="px-1 py-2 border-l border-b bg-white group-hover:bg-slate-50/50">
                        <input type="text" class="input-cell font-black text-blue-600" value="${rowSaved[1] || item.target}" ${!isAdmin ? 'disabled' : ''} onkeydown="handleKeyDown(event, this)">
                    </td>
                    ${monthCells}
                    <td class="${isAdmin ? '' : 'hidden'} px-2 py-2 border-l border-b text-center">
                        <button onclick="deleteRow(${rowIndex})" class="text-red-400 hover:text-red-600 transition"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
                row.querySelectorAll('.input-cell').forEach(input => formatInput(input));
            });
            lucide.createIcons();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleAuthClick() {
            if (isAdmin) {
                if (confirm("是否退出管理員編輯模式？")) { isAdmin = false; updateUIState(); renderTable(currentTab); }
            } else { openLoginModal(); }
        }

        function openLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
            togglePasswordView(false);
            document.getElementById('login-password').focus();
        }

        function closeLoginModal() { 
            document.getElementById('login-modal').classList.add('hidden'); 
            document.getElementById('login-password').value = ''; 
            document.getElementById('login-error').classList.add('hidden'); 
        }

        function togglePasswordView(showChange) {
            const loginView = document.getElementById('login-view');
            const changeView = document.getElementById('change-pwd-view');
            if (showChange) {
                loginView.classList.add('hidden');
                changeView.classList.remove('hidden');
            } else {
                loginView.classList.remove('hidden');
                changeView.classList.add('hidden');
            }
        }

        // 核心邏輯：從 localStorage 取得密碼，預設為 1068
        function getAdminPassword() {
            return localStorage.getItem('ospms_admin_pwd') || '1068';
        }

        function attemptLogin() {
            if (document.getElementById('login-password').value === getAdminPassword()) { 
                isAdmin = true; updateUIState(); closeLoginModal(); renderTable(currentTab); 
            } else { 
                document.getElementById('login-error').classList.remove('hidden'); 
            }
        }

        function handleChangePassword() {
            const oldPwd = document.getElementById('old-password').value;
            const newPwd = document.getElementById('new-password').value;
            const errorEl = document.getElementById('pwd-change-error');
            
            errorEl.classList.add('hidden');

            if (oldPwd !== getAdminPassword()) {
                errorEl.innerText = "舊密碼不正確";
                errorEl.classList.remove('hidden');
                return;
            }

            if (newPwd.length < 4) {
                errorEl.innerText = "新密碼至少需要 4 位數";
                errorEl.classList.remove('hidden');
                return;
            }

            localStorage.setItem('ospms_admin_pwd', newPwd);
            alert("管理密碼修改成功！下次請使用新密碼登入。");
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            togglePasswordView(false);
        }

        function updateUIState() {
            const authIcon = document.getElementById('auth-icon');
            const badge = document.getElementById('admin-badge');
            if (isAdmin) {
                authIcon.setAttribute('data-lucide', 'unlock');
                authIcon.classList.replace('text-slate-500', 'text-yellow-500');
                badge.classList.remove('hidden');
            } else {
                authIcon.setAttribute('data-lucide', 'lock');
                authIcon.classList.replace('text-yellow-500', 'text-slate-500');
                badge.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function saveAndLogout() {
            saveCurrentTabData(); persistToStorage();
            isAdmin = false; updateUIState(); renderTable(currentTab);
            const n = document.createElement('div');
            n.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-green-600 text-white px-8 py-3 rounded-full font-bold shadow-2xl animate-bounce z-[200]";
            n.innerText = "資料已儲存！";
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2500);
        }

        function addNewRow() {
            saveCurrentTabData();
            appData[currentTab].push({ id: (appData[currentTab].length + 1).toString(), name: "新項目", content: "內容", schedule: "適時", target: "100%" });
            renderTable(currentTab);
        }

        function deleteRow(idx) { if (confirm("確定刪除？")) { saveCurrentTabData(); appData[currentTab].splice(idx, 1); renderTable(currentTab); } }

        function handleYearFormat(input) {
            let val = input.value.trim();
            let match = val.match(/\d+/);
            if (match) {
                let y = parseInt(match[0]);
                if (y > 1911) input.value = `${y}年度 (${y - 1911}年)`;
                else input.value = `${y + 1911}年度 (${y}年)`;
            }
        }

        function appendPercentage(input) {
            let v = input.value.trim();
            if (v !== "" && v !== "-" && !isNaN(v)) { input.value = v + "%"; formatInput(input); }
        }

        function formatInput(input) {
            let val = input.value.trim().toUpperCase();
            let num = parseFloat(val);
            if (val === "" || val === "-") { input.style.color = '#94a3b8'; return; }
            if (val.includes('合格') || val === 'OK') { input.style.color = '#059669'; return; }
            if (!isNaN(num)) {
                if (num <= 30) input.style.color = '#ef4444';
                else if (num <= 70) input.style.color = '#f59e0b';
                else if (num < 100) input.style.color = '#2563eb';
                else input.style.color = '#059669';
            }
        }

        function handleKeyDown(e, input) {
            const cell = input.parentElement;
            const row = cell.parentElement;
            const table = row.parentElement;
            const cells = Array.from(row.cells);
            const rows = Array.from(table.rows);
            const rIdx = rows.indexOf(row);
            const cIdx = cells.indexOf(cell);
            if (e.key === "Enter" || e.key === "ArrowDown") {
                e.preventDefault();
                if (rIdx < rows.length - 1) rows[rIdx + 1].cells[cIdx].querySelector('input')?.focus();
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                if (rIdx > 0) rows[rIdx - 1].cells[cIdx].querySelector('input')?.focus();
            } else if (e.key === "ArrowRight") {
                if (input.selectionStart === input.value.length) {
                    if (cIdx < cells.length - 1) cells[cIdx + 1].querySelector('input')?.focus();
                }
            } else if (e.key === "ArrowLeft") {
                if (input.selectionStart === 0) {
                    if (cIdx > 0) cells[cIdx - 1].querySelector('input')?.focus();
                }
            }
        }

        window.onload = () => { loadFromStorage(); initNav(); switchTab('plan'); };
    </script>
</body>
</html>
